<div class="card" style="display: flex; flex-direction: column; justify-content: space-between; border: 1px solid var(--border); box-shadow: var(--shadow-sm); padding: 1.5rem; margin: 0;">
    <div>
        <div style="font-size: 1.6rem; margin-bottom: 0.75rem;" class="{{ color }}">
            <i class="fa-solid {{ icon }}"></i>
        </div>
        <h3 class="card-title" style="font-size: 1.25rem; margin-bottom: 0.5rem;">{{ title }}</h3>
        <p style="color: var(--text-muted); line-height: 1.4; font-size: 0.9rem; margin-bottom: 0;">{{ desc }}</p>
    </div>
    {% if not hide_button %}
    <div style="margin-top: 1.5rem;">
        <a href="{% url url_name %}" class="btn btn-primary" style="width: 100%; box-sizing: border-box; padding: 0.6rem 1rem; font-size: 0.9rem;">Start Analysis</a>
    </div>
    {% endif %}
</div>
