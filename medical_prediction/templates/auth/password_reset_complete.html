{% extends 'base.html' %}

{% block title %}Password Reset Complete - MediSense{% endblock %}

{% block content %}
<div style="max-width: 450px; margin: 4rem auto; animation: fadeIn 0.4s ease-out;">
    <div class="card" style="padding: 3rem 2rem; text-align: center;">
        <div style="width: 80px; height: 80px; border-radius: 50%; background: rgba(16, 185, 129, 0.1); color: #10b981; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; margin: 0 auto 1.5rem;">
            <i class="fa-solid fa-shield-check"></i>
        </div>
        
        <h2 class="card-title" style="margin-bottom: 1rem;">Password Reset Complete</h2>
        
        <p style="color: var(--text-muted); font-size: 1rem; line-height: 1.6; margin-bottom: 2rem;">
            Your password has been successfully reset. You can now use your new password to log in.
        </p>
        
        <a href="{% url 'login' %}" class="btn btn-primary" style="width: 100%; padding: 0.875rem;">
            Sign In Now <i class="fa-solid fa-arrow-right-to-bracket" style="margin-left: 0.5rem;"></i>
        </a>
    </div>
</div>
{% endblock %}
